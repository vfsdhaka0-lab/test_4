name: Auto-Initialize Android Flutter Project

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  setup-android-structure:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Flutter Project (Android Only)
        run: |
          flutter create . \
            --overwrite \
            --platforms=android \
            --org com.example.test4 \
            --project-name test_4

          mkdir -p lib/src/models lib/src/views lib/src/controllers lib/src/services

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --staged --quiet; then
            echo "No new changes to commit."
          else
            git commit -m "chore: ensure android flutter structure and org id"
            git pull --rebase origin main || echo "No remote changes to rebase"
            git push origin HEAD:main
          fi
